<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurants</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../static/restrauntstyle.css">
</head>

<body>
    <a href="javascript:history.back()" class="back-btn">← Back</a>

<h2>Restaurants</h2>

<div class="container">
    {% for r in restaurants %}
    <a href="/menu/{{ r[0] }}" class="card-link">
    <div class="card">

        {% set name = r[1].lower() %}

        {% if 'pizza' in name %}
            <img src="https://source.unsplash.com/400x300/?pizza" alt="">
        {% elif 'biryani' in name %}
            <img src="https://source.unsplash.com/400x300/?biryani" alt="">
        {% elif 'burger' in name %}
            <img src="https://source.unsplash.com/400x300/?burger" alt="">
        {% elif 'cafe' in name %}
            <img src="https://source.unsplash.com/400x300/?cafe" alt="">
        {% else %}
            <img src="https://source.unsplash.com/400x300/?restaurant,food" alt="">
        {% endif %}

        <h3>{{ r[1] }}</h3>
        <p>{{ r[2] }}</p>

    </div>
</a>
    {% endfor %}
</div>

</body>
</html>
