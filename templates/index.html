<!DOCTYPE html>
<html>
<head>
    <title>Food Delivery</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<!-- NAVBAR -->

    <div class="nav-buttons">
        <a href="/login" class="btn-outline">Login</a>
        <a href="/register" class="btn-outline">Register</a>
    </div>

<div class="hero">

    <div class="hero-left">
        <img src="{{ url_for('static', filename='images/biryani.png') }}" alt="food">
    </div>

    <div class="hero-center">
        <h1>Order food from your favorite restaurants 🍕</h1>
        <p>Fast delivery at your doorstep</p>

        <div class="search-box">
            <input type="text" placeholder="Search restaurants or dishes...">
            <button>Search</button>
        </div>
    </div>

    <div class="hero-right">
        <img src="{{ url_for('static', filename='images/pizza.png') }}" alt="food">
    </div>

</div>
</div>
</body>
</html>
