<!DOCTYPE html>
<html>
<head>
    <title>Analytics</title>
    <link rel="stylesheet" href="../static/analyticsstyle.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
</head>
<body>
<a href="/dashboard" class="back-btn">← Back</a>
<h1>Analytics</h1>

<div class="dashboard">

    <!-- LEFT -->
    <div class="left">

        <!-- STATS -->
        <div class="stats">
            <div class="stat-card">
                <h2 class="counter" data-target="{{ users }}">0</h2>
                <p>Total Users</p>
            </div>

            <div class="stat-card">
                <h2 class="counter" data-target="{{ orders }}">0</h2>
                <p>Total Orders</p>
            </div>
        </div>

        <!-- TOP ITEMS -->
        <div class="card">
            <h3>🔥 Trending Now</h3>

            {% if popular_items %}
                {% for item in popular_items %}
                    <div class="item-row">
                        <span>{{ item[0] }}</span>
                        <b>{{ item[1] }}</b>
                    </div>
                {% endfor %}
            {% else %}
                <p>No data available</p>
            {% endif %}
        </div>

    </div>

    <!-- RIGHT -->
    <div class="right">
        <canvas id="myChart"></canvas>
    </div>

</div>

<!-- DATA PASS -->
<div id="data"
     data-items='{{ popular_items | tojson }}'>
</div>

<script>
    // ===== CHART =====
    const dataDiv = document.getElementById("data");
    const rawData = JSON.parse(dataDiv.getAttribute("data-items") || "[]");

    const labels = rawData.map(item => item[0]);
    const values = rawData.map(item => item[1]);

    const ctx = document.getElementById('myChart').getContext('2d');

new Chart(ctx, {
    type: 'doughnut',
    data: {
        labels: labels,
        datasets: [{
            data: values,
            backgroundColor: ['#06b6d4', '#f59e0b', '#ef4444'],
            borderWidth: 0
        }]
    },
    options: {
        responsive: true,

        // 🔥 YAHI ADD KARNA THA (animation)
        animation: {
            animateRotate: true,
            animateScale: true,
            duration: 1200,
            easing: 'easeOutCubic'
        },

        cutout: '70%',
        plugins: {
            legend: {
                labels: {
                    color: "#ffffff",
                    font: {
                        size: 20
                    }
                }
            }
        }
    }
});

    // ===== COUNTER ANIMATION =====
    const counters = document.querySelectorAll('.counter');

    counters.forEach(counter => {
        const update = () => {
            const target = +counter.getAttribute('data-target');
            const current = +counter.innerText;

            const increment = target / 40;

            if (current < target) {
                counter.innerText = Math.ceil(current + increment);
                setTimeout(update, 125);
            } else {
                counter.innerText = target;
            }
        };

        update();
    });
</script>

</body>
</html>
