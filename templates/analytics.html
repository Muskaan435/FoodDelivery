<!DOCTYPE html>
<html>
<head>
    <title>Analytics</title>
    <link rel="stylesheet" href="../static/analyticsstyle.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
</head>

<body>

<a href="/dashboard" class="back-btn">← Back</a>
<h1>Your Analytics</h1>

<div class="dashboard">

    <!-- LEFT -->
    <div class="left">

        <!-- STATS -->
        <div class="stats">
            <div class="stat-card">
                <h2 class="counter" data-target="{{ orders }}">0</h2>
                <p>Your Orders</p>
            </div>
        </div>

        <!-- TOP ITEMS -->
        <div class="card">
            <h3>🔥 Your Top Picks</h3>

            {% if popular_items %}
                {% for item in popular_items %}
                    <div class="item-row">
                        <span>{{ item[0] }}</span>
                        <b>{{ item[1] }}</b>
                    </div>
                {% endfor %}
            {% else %}
                <p>No data available</p>
            {% endif %}
        </div>

    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="chart-card">
            <canvas id="myChart"></canvas>
        </div>
    </div>

</div>

<!-- DATA PASS -->
<div id="data" data-items='{{ popular_items | tojson }}'></div>

<script>
// 📊 CHART
const dataDiv = document.getElementById("data");
const rawData = JSON.parse(dataDiv.getAttribute("data-items") || "[]");

const labels = rawData.map(item => item[0]);
const values = rawData.map(item => item[1]);

const ctx = document.getElementById('myChart').getContext('2d');

new Chart(ctx, {
    type: 'doughnut',
    data: {
        labels: labels,
        datasets: [{
            data: values,
            backgroundColor: ['#b8e3e9', '#f5b8d5', '#b298e7'],
            borderWidth: 0
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: {
            padding: {
                top: 14,
                bottom: 6
            }
        },
        animation: {
            animateRotate: true,
            animateScale: true,
            duration: 1200,
            easing: 'easeOutCubic'
        },
        cutout: '70%',
        plugins: {
            legend: {
                position: 'top',
                labels: {
                    color: "#000000",
                    font: {
                        size: 16,
                        weight: '600'
                    },
                    boxWidth: 14,
                    boxHeight: 14,
                    padding: 18,
                    usePointStyle: true,
                    pointStyle: 'rectRounded'
                }
            }
        }
    }
});

// 🔢 COUNTER ANIMATION
const counters = document.querySelectorAll('.counter');

counters.forEach(counter => {
    const update = () => {
        const target = +counter.getAttribute('data-target');
        const current = +counter.innerText;
        const increment = target / 40;

        if (current < target) {
            counter.innerText = Math.ceil(current + increment);
            setTimeout(update, 50);
        } else {
            counter.innerText = target;
        }
    };

    update();
});
</script>

</body>
</html>
