<!DOCTYPE html>
<html>
<head>
    <title>Your Orders</title>
    <link rel="stylesheet" href="/static/orderstyle.css">
</head>
<body>

<div class="header">
    <a href="/dashboard" class="back-btn">⬅ Back</a>
    <h2 class="title">Your Orders 🛒</h2>
</div>

<div class="orders-container">
{% for order in orders %}
    <div class="order-card">
        <p><span>Order ID:</span> {{ order[0] }}</p>
        <p><span>Item:</span> {{ order[1] }}</p>
        <p><span>Price:</span> ₹{{ order[2] }}</p>
        <p><span>Qty:</span> {{ order[3] }}</p>
        <p class="total">Total: ₹{{ order[2] * order[3] }}</p>
    </div>
{% endfor %}
</div>

</body>
</html>
