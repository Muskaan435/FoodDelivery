<!DOCTYPE html>
<html>
<head>
    <title>Menu</title>
    <link rel="stylesheet" href="../static/menustyle.css">
</head>
<body>

<h2>Menu 🍕</h2>

<div class="card-container">
    {% for item in items %}
    <div class="card">
        <h3>{{ item[2] }}</h3>
        <p>Price: ₹{{ item[3] }}</p>
        <!-- Buttons -->
        <a href="/add_to_cart/{{ item[0] }}" class="btn">Add to Cart</a>
        <a href="/order/{{ item[0] }}" class="btn order">Order Now</a>
    </div>
    {% endfor %}
</div>

</body>
</html>
