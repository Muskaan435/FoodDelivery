<!DOCTYPE html>
<html>
<head>
    <title>Menu</title>
    <link rel="stylesheet" href="../static/menustyle.css">
</head>

<body>

<div class="header">
    <div>
        <a href="/dashboard" class="back-btn">⬅ Back</a>
    </div>

    <h2>Menu</h2>

    <div class="cart-icon" onclick="openCart()">
        🛒 <span id="cart-count">0</span>
    </div>
</div>

<div class="card-container">
    {% for item in items %}
    <div class="card">

        <!-- 🔥 TOP SECTION -->
        <div class="card-top">
            <img src="{{ url_for('static', filename='uploads/menu/' ~ item[1] ~ '/' ~ item[0] ~ '.jpg') }}"
                 onerror="this.src='https://picsum.photos/120?random={{ item[0] }}'"
                 alt="{{ item[2] }}">

            <div class="info">
                <h3>{{ item[2] }}</h3>
                <p>₹{{ item[3] }}</p>
            </div>
        </div>

        <!-- 🔥 BUTTONS -->
        <div class="card-bottom">
            <button onclick="addToCart({{ item[0] }}, `{{ item[2] }}`, {{ item[3] }})" class="btn">
                Add to Cart
            </button>

            <button onclick="quickOrder(this, {{ item[0] }}, `{{ item[2] }}`)" class="btn order">
                Order Now
            </button>
        </div>

    </div>
    {% endfor %}
</div>

<!-- CART MODAL -->
<div id="cart-modal" class="modal">
    <div class="modal-content">
        <h3>Your Cart</h3>
        <div id="cart-items"></div>
        <h4 id="total-price"></h4>
        <br>
        <button onclick="placeOrder()">Place Order</button>
    </div>
</div>

<!-- POPUP -->
<div id="popup" class="popup"></div>

<script>
let cart = [];

/* ADD TO CART */
function addToCart(id, name, price) {
    cart.push({id, name, price});
    document.getElementById("cart-count").innerText = cart.length;
    showPopup(name + " added 🛒");
}

/* OPEN CART */
function openCart() {
    let itemsDiv = document.getElementById("cart-items");
    itemsDiv.innerHTML = "";

    let total = 0;

    cart.forEach(item => {
        itemsDiv.innerHTML += `<p>${item.name} - ₹${item.price}</p>`;
        total += item.price;
    });

    document.getElementById("total-price").innerText = "Total: ₹" + total;
    document.getElementById("cart-modal").style.display = "block";
}

/* PLACE ORDER */
function placeOrder() {
    fetch('/place_order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cart: cart })
    })
    .then(res => {
        if (res.status === 401) {
            window.location.href = "/login";
            return;
        }
        return res.json();
    })
    .then(data => {
        if (data) {
            showPopup("Order Placed ✅");
            cart = [];
            document.getElementById("cart-count").innerText = 0;
            document.getElementById("cart-modal").style.display = "none";
        }
    })
    .catch(() => showPopup("Error placing order ❌"));
}

/* QUICK ORDER */
function quickOrder(btn, id, name) {
    btn.disabled = true;
    btn.innerText = "Placing...";

    fetch(`/order/${id}`, { method: 'POST' })
    .then(res => {
        if (res.status === 401) {
            window.location.href = "/login";
            return;
        }
        return res.json();
    })
    .then(data => {
        if (data) {
            showPopup(name + " ordered 🍽️");
            btn.disabled = false;
            btn.innerText = "Order Now";
            cart = [];
            document.getElementById("cart-count").innerText = 0;
        }
    })
    .catch(() => {
        showPopup("Error ❌");
        btn.disabled = false;
        btn.innerText = "Order Now";
    });
}

/* POPUP */
function showPopup(msg) {
    let popup = document.getElementById("popup");
    popup.innerText = msg;
    popup.style.display = "block";

    setTimeout(() => {
        popup.style.display = "none";
    }, 1500);
}
</script>

</body>
</html>
