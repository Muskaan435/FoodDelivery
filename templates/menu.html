<!DOCTYPE html>
<html>
<head>
    <title>Menu</title>
    <link rel="stylesheet" href="../static/menustyle.css">
        <link rel="icon" type="image/png" href=".//static/images/logo.png">

</head>

<body>

<div class="header">
    <div>
        <a href="/dashboard" class="back-btn">⬅ Back</a>
    </div>

    <h2>Menu</h2>

    <a href="/cart" class="cart-icon">
    🛒 <span id="cart-count">0</span>
</a>
</div>

<div class="card-container">
    {% for item in items %}
    <div class="card">

        <!-- 🔥 TOP SECTION -->
        <div class="card-top">
            <img src="{{ url_for('static', filename='uploads/menu/' ~ item[1] ~ '/' ~ item[0] ~ '.jpg') }}"
                 onerror="this.src='https://picsum.photos/120?random={{ item[0] }}'"
                 alt="{{ item[2] }}">

            <div class="info">
                <h3>{{ item[2] }}</h3>
                <p>₹{{ item[3] }}</p>
            </div>
        </div>

        <!-- 🔥 BUTTONS -->
        <div class="card-bottom">
            <button onclick="addToCart(
    {{ item[0] }},
    `{{ item[2] }}`,
    {{ item[3] }},
    `{{ url_for('static', filename='uploads/menu/' ~ item[1] ~ '/' ~ item[0] ~ '.jpg') }}`
)" class="btn">
                Add to Cart
            </button>

            <button onclick="quickOrder(this, {{ item[0] }}, `{{ item[2] }}`)" class="btn order">
                Order Now
            </button>
        </div>

    </div>
    {% endfor %}
</div>


<!-- POPUP -->
<div id="popup" class="popup"></div>

<script>

function addToCart(id, name, price, image) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.push({ id, name, price, image }); // ✅ image add kiya

    localStorage.setItem("cart", JSON.stringify(cart));

    document.getElementById("cart-count").innerText = cart.length;

    showPopup(name + " added 🛒");

    document.getElementById("cart-text").innerText =
        cart.length + " item(s) added";

    document.getElementById("cart-footer").classList.remove("hidden");
}
/* QUICK ORDER */
function quickOrder(btn, id, name) {
    btn.disabled = true;
    btn.innerText = "Placing...";

    fetch(`/order/${id}`, { method: 'POST' })
    .then(res => {
        if (res.status === 401) {
            window.location.href = "/login";
            return;
        }
        return res.json();
    })
    .then(data => {
        if (data) {
            showPopup(name + " ordered 🍽️");
            btn.disabled = false;
            btn.innerText = "Order Now";
        }
    })
    .catch(() => {
        showPopup("Error ❌");
        btn.disabled = false;
        btn.innerText = "Order Now";
    });
}

/* POPUP */
function showPopup(msg) {
    let popup = document.getElementById("popup");
    popup.innerText = msg;
    popup.style.display = "block";

    setTimeout(() => {
        popup.style.display = "none";
    }, 1500);
}

window.onload = function() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    document.getElementById("cart-count").innerText = cart.length;
}

function goToCart() {
    window.location.href = "/cart";
}
</script>
<!-- FLOATING CART BAR -->
<div id="cart-footer" class="cart-footer hidden">
    <span id="cart-text">1 item added</span>
    <button onclick="goToCart()">Go to Cart</button>
</div>
</body>
</html>
