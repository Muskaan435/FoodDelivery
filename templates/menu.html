<!DOCTYPE html>
<html>
<head>
    <title>Menu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>Menu 🍕</h2>

{% for item in items %}
<div class="card">
    <h3>{{ item[2] }}</h3>
    <p>Price: ₹{{ item[3] }}</p>
    <a href="/order/{{ item[0] }}">Order Now</a>
</div>
{% endfor %}

</body>
</html>
